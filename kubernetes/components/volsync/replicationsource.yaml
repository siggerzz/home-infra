---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: "${VOLSYNC_CLAIM}"
spec:
  sourcePVC: "${VOLSYNC_CLAIM}"
  trigger:
    schedule: "0 2 * * *"
  kopia:
    repository: "${APP}-volsync-secret"
    copyMethod: Direct
    compression: zstd-fastest
    parallelism: 2
    cacheCapacity: 1Gi
    cacheStorageClassName: openebs-hostpath
    cacheAccessModes:
      - ReadWriteOnce
    repositoryCapacity: ${VOLSYNC_CAPACITY}
    repositoryStorageClassName: nfs-volsync
    repositoryAccessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: ${VOLSYNC_UID:=0}
      runAsGroup: ${VOLSYNC_GID:=0}
      fsGroup: ${VOLSYNC_GID:=0}
    retain:
      daily: 7
      weekly: 4
