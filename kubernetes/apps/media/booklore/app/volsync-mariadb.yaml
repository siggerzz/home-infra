---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: booklore-mariadb
spec:
  sourcePVC: booklore-mariadb
  trigger:
    schedule: "0 2 * * *"
  kopia:
    repository: "${APP}-volsync-secret"
    copyMethod: Direct
    compression: zstd-fastest
    parallelism: 2
    cacheCapacity: 1Gi
    cacheStorageClassName: openebs-hostpath
    cacheAccessModes:
      - ReadWriteOnce
    repositoryCapacity: 10Gi
    repositoryStorageClassName: nfs-volsync
    repositoryAccessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
    retain:
      daily: 7
      weekly: 4
