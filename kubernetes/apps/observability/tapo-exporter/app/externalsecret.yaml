---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tapo-exporter-secret
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: tapo-exporter-secret
    creationPolicy: Owner
  data:
    - secretKey: TAPO_EMAIL
      remoteRef:
        key: /tapo-exporter/TAPO_EMAIL
    - secretKey: TAPO_PASSWORD
      remoteRef:
        key: /tapo-exporter/TAPO_PASSWORD
