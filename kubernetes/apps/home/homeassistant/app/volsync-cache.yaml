---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-assistant-cache-repo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-volsync
  resources:
    requests:
      storage: 5Gi
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: home-assistant-cache
spec:
  sourcePVC: home-assistant-cache
  trigger:
    schedule: "0 2 * * *"
  kopia:
    repository: "${APP}-volsync-secret"
    copyMethod: Direct
    compression: zstd-fastest
    parallelism: 2
    cacheCapacity: 1Gi
    cacheStorageClassName: openebs-hostpath
    cacheAccessModes:
      - ReadWriteOnce
    moverVolumes:
      - mountPath: repository
        volumeSource:
          persistentVolumeClaim:
            claimName: home-assistant-cache-repo
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    retain:
      daily: 7
      weekly: 4
