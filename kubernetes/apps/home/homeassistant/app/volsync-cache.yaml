---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: home-assistant-cache
spec:
  sourcePVC: home-assistant-cache
  trigger:
    schedule: "0 2 * * *"
  kopia:
    repository: "${APP}-volsync-secret"
    copyMethod: Direct
    compression: zstd-fastest
    parallelism: 2
    cacheCapacity: 1Gi
    cacheStorageClassName: openebs-hostpath
    cacheAccessModes:
      - ReadWriteOnce
    capacity: 5Gi
    storageClassName: nfs-volsync
    accessModes:
      - ReadWriteOnce
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
    retain:
      daily: 7
      weekly: 4
